[settings]
dotfiles.root = "~/dotfiles"
dotfiles.default_mode = "symlink"

[dotfiles]
"~/.gitconfig" = "config/git/gitconfig"
"~/.vimrc" = "config/vim/vimrc"
"~/.vim/colors" = { source = "config/vim/colors", mode = "symlink-each" }
"~/.config/nvim/init.vim" = "config/nvim/init.vim"
"~/.config/fish/config.fish" = "config/fish/config.fish"
"~/.config/git/ignore" = "config/git/ignore"
"~/.config/herdr/config.toml" = "config/herdr/config.toml"
"~/.config/ghostty/config" = "config/ghostty/config"
"~/.config/hunk/config.toml" = "config/hunk/config.toml"
"~/.config/mise/conf.d/00-dotfiles.toml" = "config/mise/config.toml"
"~/.config/fish/functions" = { source = "config/fish/functions", mode = "symlink-each" }
"~/.config/fish/conf.d" = { source = "config/fish/conf.d", mode = "symlink-each" }
"~/.config/fish/completions" = { source = "config/fish/completions", mode = "symlink-each" }

[bootstrap.packages]
"brew:fish" = "latest"
"brew:bat" = "latest"
"brew:fd" = "latest"
"brew:sk" = "latest"
"brew:ripgrep" = "latest"
"brew:eza" = "latest"
"brew:git-delta" = "latest"
"brew:git-lfs" = "latest"
"brew:ffmpeg" = "latest"
"brew:imagemagick" = "latest"
"brew:fzf" = "latest"
"brew:zoxide" = "latest"
"brew:jq" = "latest"
"brew:starship" = "latest"
"brew:direnv" = "latest"
"brew:hunk" = "latest"
"brew:neovim" = "latest"

[bootstrap.macos.keyboard]
key_repeat = 1
initial_key_repeat = 10

[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

[settings]
dotfiles.root = "~/dotfiles"
dotfiles.default_mode = "symlink"

[dotfiles]
"~/.gitconfig" = "config/gitconfig"
"~/.vimrc" = "config/vimrc"
"~/.config/fish/config.fish" = "config.fish"
"~/.config/git/ignore" = "ignore"
"~/.config/herdr/config.toml" = "config/herdr/config.toml"
"~/.config/ghostty/config" = "config/ghostty/config"
"~/.config/wezterm/wezterm.lua" = "wezterm.lua"
"~/.config/mise/conf.d/00-dotfiles.toml" = "config/mise/config.toml"

[bootstrap.packages]
"brew:fish" = "latest"
"brew:bat" = "latest"
"brew:fd" = "latest"
"brew:sk" = "latest"
"brew:ripgrep" = "latest"
"brew:eza" = "latest"
"brew:git-delta" = "latest"
"brew:hub" = "latest"
"brew:ffmpeg" = "latest"
"brew:imagemagick" = "latest"
"brew:tree" = "latest"
"brew:fzf" = "latest"
"brew:zoxide" = "latest"
"brew:jq" = "latest"
"brew:gh" = "latest"
"brew:asdf" = "latest"
"brew:direnv" = "latest"

[bootstrap.macos.defaults]
"NSGlobalDomain" = { InitialKeyRepeat = 10, KeyRepeat = 1 }

[bootstrap.mise_shell_activate]
fish = "activate"

[tasks.bootstrap]
description = "Install fisher and fish plugins (no declarative mise equivalent exists)"
run = '''
fish -c 'functions -q fisher; or begin
    curl https://git.io/fisher --create-dirs -sLo ~/.config/fish/functions/fisher.fish
    source ~/.config/fish/functions/fisher.fish
end'
fish -c 'fisher install yamadayuki/lure'
'''

[tasks."migrate-etc-mise-config"]
description = "One-time migration: remove the old sudo-copied /etc/mise/config.toml, now superseded by the ~/.config/mise/conf.d/00-dotfiles.toml symlink"
run = '''
if [ -f /etc/mise/config.toml ]; then
  echo "Removing legacy /etc/mise/config.toml (superseded by ~/.config/mise/conf.d/00-dotfiles.toml)"
  sudo rm -f /etc/mise/config.toml
  sudo rmdir /etc/mise 2>/dev/null || true
else
  echo "/etc/mise/config.toml not found, nothing to migrate"
fi
'''

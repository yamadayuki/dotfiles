[settings]
dotfiles.root = "~/dotfiles"
dotfiles.default_mode = "symlink"

[dotfiles]
"~/.gitconfig" = "config/git/gitconfig"
"~/.vimrc" = "config/vim/vimrc"
"~/.vim/colors" = { source = "config/vim/colors", mode = "symlink-each" }
"~/.config/nvim/init.vim" = "config/nvim/init.vim"
"~/.config/fish/config.fish" = "config/fish/config.fish"
"~/.config/git/ignore" = "config/git/ignore"
"~/.config/herdr/config.toml" = "config/herdr/config.toml"
"~/.config/ghostty/config" = "config/ghostty/config"
"~/.config/hunk/config.toml" = "config/hunk/config.toml"
"~/.config/mise/conf.d/00-dotfiles.toml" = "config/mise/config.toml"
"~/.config/fish/functions" = { source = "config/fish/functions", mode = "symlink-each" }
"~/.config/fish/conf.d" = { source = "config/fish/conf.d", mode = "symlink-each" }
"~/.config/fish/completions" = { source = "config/fish/completions", mode = "symlink-each" }

[bootstrap.packages]
"brew:fish" = "latest"
"brew:bat" = "latest"
"brew:fd" = "latest"
"brew:sk" = "latest"
"brew:ripgrep" = "latest"
"brew:eza" = "latest"
"brew:git-delta" = "latest"
"brew:git-lfs" = "latest"
"brew:ffmpeg" = "latest"
"brew:imagemagick" = "latest"
"brew:fzf" = "latest"
"brew:zoxide" = "latest"
"brew:jq" = "latest"
"brew:starship" = "latest"
"brew:direnv" = "latest"
"brew:hunk" = "latest"
"brew:neovim" = "latest"

[bootstrap.macos.keyboard]
key_repeat = 1
initial_key_repeat = 10

[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

[tasks."migrate-legacy-setup"]
description = "One-time migration for machines set up before mise bootstrap: safe to delete this task once every machine has run it. Removes fisher (and its managed files, now vendored in [dotfiles]), the old sudo-copied /etc/mise/config.toml (superseded by ~/.config/mise/conf.d/00-dotfiles.toml), and clears any stale mise ignored-config state"
run = '''
if fish -c 'functions -q fisher' 2>/dev/null; then
  fish -c 'fisher remove yamadayuki/lure' || true
fi
rm -f ~/.config/fish/functions/fisher.fish ~/.config/fish/fish_plugins
echo "fisher removed (if it was present)"

if [ -f /etc/mise/config.toml ]; then
  echo "Removing legacy /etc/mise/config.toml (superseded by ~/.config/mise/conf.d/00-dotfiles.toml)"
  sudo rm -f /etc/mise/config.toml
  sudo rmdir /etc/mise 2>/dev/null || true
else
  echo "/etc/mise/config.toml not found, nothing to migrate"
fi

if [ -d "$HOME/.local/state/mise/ignored-configs" ] && [ "$(ls -A "$HOME/.local/state/mise/ignored-configs" 2>/dev/null)" ]; then
  echo "Clearing stale mise ignored-config state (config/mise/config.toml may have been auto-ignored before mise trust covered it)"
  rm -rf "$HOME/.local/state/mise/ignored-configs"
else
  echo "No stale mise ignored-config state found"
fi
'''

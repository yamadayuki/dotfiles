[settings]
dotfiles.root = "~/dotfiles"
dotfiles.default_mode = "symlink"

[dotfiles]
"~/.gitconfig" = "config/git/gitconfig"
"~/.vimrc" = "config/vim/vimrc"
"~/.config/fish/config.fish" = "config/fish/config.fish"
"~/.config/git/ignore" = "config/git/ignore"
"~/.config/herdr/config.toml" = "config/herdr/config.toml"
"~/.config/ghostty/config" = "config/ghostty/config"
"~/.config/mise/conf.d/00-dotfiles.toml" = "config/mise/config.toml"
"~/.config/fish/functions" = { source = "config/fish/functions", mode = "symlink-each" }
"~/.config/fish/conf.d" = { source = "config/fish/conf.d", mode = "symlink-each" }
"~/.config/fish/completions" = { source = "config/fish/completions", mode = "symlink-each" }

[bootstrap.packages]
"brew:fish" = "latest"
"brew:bat" = "latest"
"brew:fd" = "latest"
"brew:sk" = "latest"
"brew:ripgrep" = "latest"
"brew:eza" = "latest"
"brew:git-delta" = "latest"
"brew:git-lfs" = "latest"
"brew:ffmpeg" = "latest"
"brew:imagemagick" = "latest"
"brew:fzf" = "latest"
"brew:zoxide" = "latest"
"brew:jq" = "latest"
"brew:starship" = "latest"
"brew:direnv" = "latest"

[bootstrap.macos.defaults]
"NSGlobalDomain" = { InitialKeyRepeat = 10, KeyRepeat = 1 }

[bootstrap.mise_shell_activate]
fish = "activate"

[tasks."migrate-legacy-setup"]
description = "One-time migration for machines set up before mise bootstrap: safe to delete this task once every machine has run it. Removes fisher (and its managed files, now vendored in [dotfiles]) and the old sudo-copied /etc/mise/config.toml (superseded by ~/.config/mise/conf.d/00-dotfiles.toml)"
run = '''
if fish -c 'functions -q fisher' 2>/dev/null; then
  fish -c 'fisher remove yamadayuki/lure' || true
fi
rm -f ~/.config/fish/functions/fisher.fish ~/.config/fish/fish_plugins
echo "fisher removed (if it was present)"

if [ -f /etc/mise/config.toml ]; then
  echo "Removing legacy /etc/mise/config.toml (superseded by ~/.config/mise/conf.d/00-dotfiles.toml)"
  sudo rm -f /etc/mise/config.toml
  sudo rmdir /etc/mise 2>/dev/null || true
else
  echo "/etc/mise/config.toml not found, nothing to migrate"
fi
'''
